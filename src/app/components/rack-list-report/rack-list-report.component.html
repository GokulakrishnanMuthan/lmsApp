<mat-form-field class="example-full-width" appearance="outline">
    <mat-label>Search Rack</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Name" #input>
   
  </mat-form-field>

  <br><br> 

  
        
<div class="mat-elevation-z8" #TABLE>
    
    <table mat-table matSort [dataSource]="dataSource" #table>
      
          <!-- username Column -->
      <ng-container matColumnDef="rackName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Rack Name </th>
        <td mat-cell *matCellDef="let element"> {{element.rackName}} </td>
      </ng-container>
  
      <!-- Name Column -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Title </th>
        <td mat-cell *matCellDef="let element"> {{element.title}} </td>
      </ng-container>
  
      <!-- Weight Column -->
      <ng-container matColumnDef="subTitle">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Sub Title </th>
        <td mat-cell *matCellDef="let element"> {{element.subTitle}} </td>
      </ng-container>
  
      <!-- Symbol Column -->
      <ng-container matColumnDef="totalBooks">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Total Books </th>
        <td mat-cell *matCellDef="let element"> {{element.totalBooks}} </td>
      </ng-container>
       
      
      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  
    <mat-paginator [pageSizeOptions]="[5, 10,50,100,200,500,1000]"
                   showFirstLastButtons
                   aria-label="Select page of periodic elements">
    </mat-paginator>
  </div><br><br> 
  <div><button mat-raised-button color="primary" (click)="ExportTOExcel()">Export as Excel</button></div>
