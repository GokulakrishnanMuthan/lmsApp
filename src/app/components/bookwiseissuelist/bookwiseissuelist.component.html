<mat-toolbar color="primary">
    <mat-toolbar-row>
      <span>Bookwise Issue List</span>
      <span class="example-spacer"></span>
      <!-- <button mat-raised-button color="accent" (click)="newissue()">
        New Issue Book
      </button> -->
    </mat-toolbar-row>
  </mat-toolbar>
  
  <mat-card>
  
      <mat-card-content>
  
    <mat-form-field appearance="outline">
        <mat-label>Search</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Search Book Name" #input>
      </mat-form-field>
    
    <div class="mat-elevation-z8">
        
        <table mat-table matSort [dataSource]="dataSource">
      
          <!-- username Column -->
         
      
          <!-- Name Column -->
          <ng-container matColumnDef="title" class="make-alert">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
            <td mat-cell *matCellDef="let element"> {{element.title}} </td>
          </ng-container>
           <!-- Name Column -->
           <ng-container matColumnDef="devoteName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Devote Name </th>
            <td mat-cell *matCellDef="let element"> {{element.devoteName}} </td>
          </ng-container>
          <ng-container matColumnDef="phoneNo">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Phone </th>
            <td mat-cell *matCellDef="let element"> {{element.phoneNo}} </td>
          </ng-container>

            <!-- Symbol Column -->
            <ng-container matColumnDef="roomNo">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Room No </th>
                <td mat-cell *matCellDef="let element"> {{element.roomNo}} </td>
              </ng-container>
              
          <!-- Name Column -->
          <ng-container matColumnDef="issueDate">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Issue Date </th>
            <td mat-cell *matCellDef="let element"> {{element.issueDate}} </td>
          </ng-container>
          
          <!-- Name Column -->
          <ng-container matColumnDef="returnDate">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Date of Return </th>
            <td mat-cell *matCellDef="let element"> {{element.returnDate}} </td>
          </ng-container>
  
          <ng-container matColumnDef="action">
            <th mat-header-cell *matHeaderCellDef> Action </th>
            <td mat-cell *matCellDef="let element"> 
                <mat-icon color="primary" (click)="returnBook(element)">view_list</mat-icon>&nbsp;&nbsp;
                
            </td>
          </ng-container>
      
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row [ngClass]="{'make-alert': row.overDue == 1}" *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      
        <mat-paginator [pageSizeOptions]="[5, 10, 20,50,100]"
                       showFirstLastButtons
                       aria-label="Select page of periodic elements">
        </mat-paginator>
      </div>
    </mat-card-content>
    </mat-card>
